<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #game {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #B185A7, #C79BB5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Экран выбора персонажа */
        #character-select {
            display: block;
        }
        #character-select.hidden {
            display: none;
        }
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .character-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .character-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        .character-card.selected {
            border-color: #C79BB5;
            background: rgba(199, 155, 181, 0.2);
        }
        .character-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .character-name {
            font-weight: bold;
            color: #fff;
        }
        .start-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(45deg, #B185A7, #C79BB5);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 20px;
        }
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Экран игры */
        #game-screen {
            display: none;
        }
        #game-screen.active {
            display: block;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #C79BB5;
        }
        .energy-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #B185A7, #C79BB5);
            width: 100%;
            transition: width 0.3s ease;
        }
        .energy-text {
            text-align: right;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }
        .character-display {
            text-align: center;
            margin: 30px 0;
        }
        .character-avatar {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(45deg, #B185A7, #C79BB5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 8px 32px rgba(199, 155, 181, 0.3);
        }
        .character-avatar:active {
            transform: scale(0.95);
        }
        .tap-area {
            text-align: center;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.7);
        }
        .back-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>✨ BTS Clicker ✨</h1>
        
        <!-- Экран выбора персонажа -->
        <div id="character-select">
            <div class="characters-grid">
                <div class="character-card" data-character="rm">
                    <div class="character-emoji">🐨</div>
                    <div class="character-name">RM</div>
                </div>
                <div class="character-card" data-character="jin">
                    <div class="character-emoji">🦙</div>
                    <div class="character-name">Jin</div>
                </div>
                <div class="character-card" data-character="suga">
                    <div class="character-emoji">🐱</div>
                    <div class="character-name">SUGA</div>
                </div>
                <div class="character-card" data-character="jhope">
                    <div class="character-emoji">🐿️</div>
                    <div class="character-name">J-Hope</div>
                </div>
                <div class="character-card" data-character="jimin">
                    <div class="character-emoji">🐥</div>
                    <div class="character-name">Jimin</div>
                </div>
                <div class="character-card" data-character="v">
                    <div class="character-emoji">🐯</div>
                    <div class="character-name">V</div>
                </div>
                <div class="character-card" data-character="jungkook">
                    <div class="character-emoji">🐰</div>
                    <div class="character-name">Jungkook</div>
                </div>
            </div>
            <button class="start-btn" id="start-game" disabled>Начать игру</button>
        </div>

        <!-- Экран игры -->
        <div id="game-screen">
            <div class="game-header">
                <button class="back-btn" id="back-to-menu">← Назад</button>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="energy-bar">
                <div class="energy-fill" id="energy-fill" style="width: 100%"></div>
            </div>
            <div class="energy-text" id="energy-text">100/100</div>

            <div class="character-display">
                <div class="character-avatar" id="tap-button">
                    <span id="character-emoji">🐰</span>
                </div>
            </div>
            <div class="tap-area">
                Тапай по персонажу! Каждый тап = 1 монета
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Состояние игры
        let currentCharacter = null;
        let score = 0;
        let energy = 100;
        const MAX_ENERGY = 100;
        let energyRegenInterval = null;

        // Элементы DOM
        const characterSelect = document.getElementById('character-select');
        const gameScreen = document.getElementById('game-screen');
        const startBtn = document.getElementById('start-game');
        const backBtn = document.getElementById('back-to-menu');
        const tapButton = document.getElementById('tap-button');
        const scoreElement = document.getElementById('score');
        const energyFill = document.getElementById('energy-fill');
        const energyText = document.getElementById('energy-text');
        const characterEmoji = document.getElementById('character-emoji');

        // Выбор персонажа
        const characterCards = document.querySelectorAll('.character-card');
        characterCards.forEach(card => {
            card.addEventListener('click', () => {
                characterCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                currentCharacter = card.dataset.character;
                
                // Обновляем эмодзи на экране игры
                const emoji = card.querySelector('.character-emoji').textContent;
                characterEmoji.textContent = emoji;
                
                startBtn.disabled = false;
            });
        });

        // Начало игры
        startBtn.addEventListener('click', () => {
            if (!currentCharacter) return;
            
            // Сброс состояния
            score = 0;
            energy = MAX_ENERGY;
            updateUI();
            
            // Переключение экранов
            characterSelect.style.display = 'none';
            gameScreen.classList.add('active');
            
            // Запуск восстановления энергии
            if (energyRegenInterval) clearInterval(energyRegenInterval);
            energyRegenInterval = setInterval(() => {
                if (energy < MAX_ENERGY) {
                    energy = Math.min(energy + 1, MAX_ENERGY);
                    updateUI();
                }
            }, 1000);
        });

        // Тап по персонажу
        tapButton.addEventListener('click', (e) => {
            if (energy <= 0) return;
            
            // Уменьшаем энергию
            energy = Math.max(energy - 1, 0);
            score++;
            
            // Анимация
            tapButton.style.transform = 'scale(0.9)';
            setTimeout(() => {
                tapButton.style.transform = 'scale(1)';
            }, 100);
            
            updateUI();
            
            // Отправляем результат в бота (опционально)
            tg.sendData(JSON.stringify({
                character: currentCharacter,
                score: score
            }));
        });

        // Возврат в меню выбора
        backBtn.addEventListener('click', () => {
            if (energyRegenInterval) {
                clearInterval(energyRegenInterval);
                energyRegenInterval = null;
            }
            
            gameScreen.classList.remove('active');
            characterSelect.style.display = 'block';
        });

        // Обновление интерфейса
        function updateUI() {
            scoreElement.textContent = score;
            const energyPercent = (energy / MAX_ENERGY) * 100;
            energyFill.style.width = energyPercent + '%';
            energyText.textContent = `${energy}/${MAX_ENERGY}`;
        }

        // Сохранение данных при закрытии
        window.addEventListener('beforeunload', () => {
            if (currentCharacter && score > 0) {
                tg.sendData(JSON.stringify({
                    character: currentCharacter,
                    score: score,
                    action: 'save'
                }));
            }
        });
    </script>
</body>
</html>
